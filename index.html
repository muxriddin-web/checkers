<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neon Checkers Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    :root{
      --bg:#050816;
      --cyan:#00f7ff;
      --pink:#ff2d75;
      --dark:#081120;
      --cell-dark:#0b1020;
      --cell-light:#1f2945;
    }

    html,body{
      width:100%;height:100%;
      overflow:hidden;
      font-family:'Orbitron',sans-serif;
      background:var(--bg);
      color:white;
    }

    body{display:flex;justify-content:center;align-items:center;}

    /* BACKGROUND */
    .background{position:fixed;inset:0;overflow:hidden;z-index:-1;}

    .glow{
      position:absolute;width:600px;height:600px;border-radius:50%;
      filter:blur(120px);
    }
    .glow1{
      background:#00f7ff33;top:-150px;left:-100px;
      animation:float1 12s ease-in-out infinite alternate;
    }
    .glow2{
      background:#ff2d7533;bottom:-150px;right:-100px;
      animation:float2 9s ease-in-out infinite alternate;
    }
    .glow3{
      background:#7b2fff22;top:50%;left:50%;
      transform:translate(-50%,-50%);
      width:400px;height:400px;
      animation:float3 15s ease-in-out infinite alternate;
    }

    @keyframes float1{from{transform:translate(0,0) scale(1);}to{transform:translate(40px,60px) scale(1.1);}}
    @keyframes float2{from{transform:translate(0,0) scale(1);}to{transform:translate(-50px,-40px) scale(1.15);}}
    @keyframes float3{from{transform:translate(-50%,-50%) scale(1);}to{transform:translate(-48%,-52%) scale(1.2);}}

    /* PARTICLES */
    .particles{position:fixed;inset:0;pointer-events:none;z-index:0;}
    .particle{
      position:absolute;width:2px;height:2px;border-radius:50%;
      background:var(--cyan);opacity:0;
      animation:particle-float linear infinite;
    }
    @keyframes particle-float{
      0%{opacity:0;transform:translateY(100vh) scale(0);}
      10%{opacity:0.6;}
      90%{opacity:0.3;}
      100%{opacity:0;transform:translateY(-10vh) scale(1.5);}
    }

    /* GLOBAL */
    .hidden{display:none !important;}

    button{
      border:none;cursor:pointer;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      background:rgba(255,255,255,0.05);
      color:var(--cyan);
      border:2px solid var(--cyan);
      border-radius:18px;
      padding:18px;
      font-size:1rem;
      font-family:'Orbitron',sans-serif;
      backdrop-filter:blur(10px);
      box-shadow:0 0 15px #00f7ff44;
      position:relative;
      overflow:hidden;
    }
    button::before{
      content:'';
      position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(0,247,255,0.1),transparent);
      opacity:0;transition:opacity 0.3s;
    }
    button:hover::before{opacity:1;}
    button:hover{
      transform:translateY(-4px) scale(1.02);
      background:rgba(0,247,255,0.15);
      box-shadow:0 0 25px var(--cyan),0 0 60px var(--cyan),0 8px 30px rgba(0,247,255,0.3);
    }
    button:active{transform:translateY(-1px) scale(0.98);}

    /* MENU */
    .menu-screen,.stats-screen{
      width:100%;height:100%;
      display:flex;flex-direction:column;
      justify-content:center;align-items:center;
      padding:20px;
      position:relative;z-index:1;
    }

    .logo{
      font-size:clamp(2rem,7vw,4.5rem);
      color:var(--cyan);
      margin-bottom:50px;
      text-shadow:0 0 10px var(--cyan),0 0 30px var(--cyan),0 0 70px var(--cyan);
      animation:logoGlow 2s ease-in-out infinite alternate;
      letter-spacing:4px;
    }
    @keyframes logoGlow{
      from{text-shadow:0 0 10px var(--cyan),0 0 30px var(--cyan),0 0 70px var(--cyan);filter:brightness(1);}
      to{text-shadow:0 0 20px var(--cyan),0 0 60px var(--cyan),0 0 120px var(--cyan),0 0 200px var(--cyan);filter:brightness(1.3);}
    }

    .menu-card{
      width:100%;max-width:420px;
      display:flex;flex-direction:column;gap:20px;
      padding:30px;border-radius:30px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(0,247,255,0.2);
      backdrop-filter:blur(20px);
      box-shadow:0 0 60px #00f7ff22,inset 0 1px 0 rgba(255,255,255,0.1);
      animation:cardAppear 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardAppear{
      from{opacity:0;transform:translateY(40px) scale(0.9);}
      to{opacity:1;transform:translateY(0) scale(1);}
    }

    /* GAME */
    .game-screen{
      width:100%;height:100%;
      padding:10px;
      display:flex;flex-direction:column;
      position:relative;z-index:1;
    }

    .top-bar{
      display:flex;justify-content:space-between;align-items:center;
      gap:12px;margin-bottom:10px;
      flex-shrink:0;
    }

    .turn-box{
      padding:10px 20px;border-radius:14px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.15);
      color:var(--cyan);
      box-shadow:0 0 20px #00f7ff22;
      font-size:0.85rem;
      transition:all 0.4s;
    }
    .turn-box.red-turn{
      color:var(--pink);
      border-color:rgba(255,45,117,0.4);
      box-shadow:0 0 20px rgba(255,45,117,0.3);
    }

    .scoreboard{
      display:grid;grid-template-columns:1fr 1fr;
      gap:10px;margin-bottom:10px;flex-shrink:0;
    }

    .score-card{
      padding:12px;text-align:center;border-radius:16px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(12px);
      font-size:0.85rem;
      transition:all 0.3s;
    }
    .red-card{box-shadow:0 0 20px #ff2d7533;}
    .blue-card{box-shadow:0 0 20px #00f7ff33;}

    .score-card .score-num{
      font-size:1.4rem;font-weight:700;
      display:block;margin-top:4px;
    }
    .red-card .score-num{color:var(--pink);}
    .blue-card .score-num{color:var(--cyan);}

    /* BOARD WRAPPER — takes remaining space */
    .board-wrapper{
      flex:1;min-height:0;
      display:flex;justify-content:center;align-items:center;
    }

    /* BOARD — fits available space */
    #board{
      /* Use the smaller of 94vw, (100vh - header approx), and max 760px */
      width:min(94vw, calc(100vh - 200px), 760px);
      height:min(94vw, calc(100vh - 200px), 760px);
      display:grid;
      grid-template-columns:repeat(8,1fr);
      border:3px solid var(--cyan);
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 0 30px var(--cyan),0 0 80px #00f7ff55,inset 0 0 30px rgba(0,247,255,0.05);
      animation:boardGlow 3s ease-in-out infinite alternate;
    }
    @keyframes boardGlow{
      from{box-shadow:0 0 20px var(--cyan),0 0 60px #00f7ff44;}
      to{box-shadow:0 0 40px var(--cyan),0 0 100px #00f7ff66,0 0 160px #00f7ff22;}
    }

    .cell{
      position:relative;display:flex;
      justify-content:center;align-items:center;
      transition:background 0.2s;
    }
    .light{background:var(--cell-light);}
    .dark{background:var(--cell-dark);}

    /* PIECES */
    .piece{
      width:76%;height:76%;border-radius:50%;
      position:relative;cursor:pointer;
      transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
      z-index:1;
    }
    .piece:hover{transform:scale(1.1);}

    .red{
      background:radial-gradient(circle at 35% 35%, #ff6b9d, var(--pink));
      box-shadow:0 0 12px var(--pink),0 0 30px var(--pink),inset 0 2px 4px rgba(255,255,255,0.3);
      animation:redPulse 2.5s ease-in-out infinite;
    }
    .blue{
      background:radial-gradient(circle at 35% 35%, #6bfaff, var(--cyan));
      box-shadow:0 0 12px var(--cyan),0 0 30px var(--cyan),inset 0 2px 4px rgba(255,255,255,0.3);
      animation:bluePulse 2.5s ease-in-out infinite;
    }

    @keyframes redPulse{
      0%,100%{box-shadow:0 0 10px var(--pink),0 0 25px var(--pink);}
      50%{box-shadow:0 0 20px var(--pink),0 0 50px var(--pink),0 0 80px rgba(255,45,117,0.4);}
    }
    @keyframes bluePulse{
      0%,100%{box-shadow:0 0 10px var(--cyan),0 0 25px var(--cyan);}
      50%{box-shadow:0 0 20px var(--cyan),0 0 50px var(--cyan),0 0 80px rgba(0,247,255,0.4);}
    }

    .selected{
      transform:scale(1.18) !important;
      outline:3px solid white;
      outline-offset:2px;
      box-shadow:0 0 0 4px white, 0 0 30px white !important;
      animation:none !important;
    }

    /* KING */
    .king::after{
      content:"👑";
      position:absolute;inset:0;
      display:flex;justify-content:center;align-items:center;
      font-size:clamp(0.8rem,2.5vw,1.2rem);
      animation:kingSpin 4s linear infinite;
      filter:drop-shadow(0 0 4px gold);
    }
    @keyframes kingSpin{
      from{transform:rotate(0deg);}
      to{transform:rotate(360deg);}
    }

    /* MOVE DOT */
    .move{
      width:28%;height:28%;border-radius:50%;
      background:rgba(255,255,255,0.9);
      box-shadow:0 0 10px white,0 0 25px white;
      cursor:pointer;
      animation:movePulse 0.8s ease-in-out infinite alternate;
      z-index:2;
      transition:transform 0.15s;
    }
    .move:hover{transform:scale(1.4);}
    @keyframes movePulse{
      from{transform:scale(0.7);opacity:0.7;}
      to{transform:scale(1.1);opacity:1;}
    }

    /* CAPTURE MOVE — highlighted differently */
    .move.capture{
      background:rgba(255,200,0,0.9);
      box-shadow:0 0 10px gold,0 0 25px gold;
    }

    /* BOTTOM */
    .bottom-buttons{margin-top:10px;text-align:center;flex-shrink:0;}

    /* STATS */
    .stats-screen h2{
      font-size:clamp(1.8rem,5vw,3rem);
      color:var(--cyan);
      margin-bottom:40px;
      text-shadow:0 0 15px var(--cyan),0 0 40px var(--cyan);
    }

    .stats-box{
      width:100%;max-width:400px;
      display:flex;flex-direction:column;gap:20px;
      margin-bottom:30px;
    }
    .stats-box div{
      padding:20px;border-radius:18px;text-align:center;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      box-shadow:0 0 20px #00f7ff22;
      animation:cardAppear 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .stats-box div:nth-child(2){animation-delay:0.1s;}

    /* WIN OVERLAY */
    .win-overlay{
      position:fixed;inset:0;
      background:rgba(5,8,22,0.85);
      display:flex;flex-direction:column;
      justify-content:center;align-items:center;
      z-index:100;
      backdrop-filter:blur(12px);
      animation:overlayIn 0.4s ease both;
    }
    @keyframes overlayIn{
      from{opacity:0;}to{opacity:1;}
    }
    .win-text{
      font-size:clamp(2rem,8vw,5rem);
      font-weight:700;
      margin-bottom:20px;
      animation:winBounce 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
      animation-delay:0.1s;
    }
    @keyframes winBounce{
      from{opacity:0;transform:scale(0.3) rotate(-10deg);}
      to{opacity:1;transform:scale(1) rotate(0deg);}
    }
    .win-text.red-win{
      color:var(--pink);
      text-shadow:0 0 30px var(--pink),0 0 80px var(--pink);
    }
    .win-text.blue-win{
      color:var(--cyan);
      text-shadow:0 0 30px var(--cyan),0 0 80px var(--cyan);
    }
    .win-sub{
      font-size:1.1rem;color:rgba(255,255,255,0.7);
      margin-bottom:40px;
      animation:winBounce 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
      animation-delay:0.2s;
    }
    .win-buttons{
      display:flex;gap:16px;flex-wrap:wrap;justify-content:center;
      animation:winBounce 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
      animation-delay:0.3s;
    }
    .win-buttons button{min-width:160px;}

    /* MOBILE */
    @media(max-width:700px){
      .top-bar{flex-direction:column;}
      button{width:100%;}
      .scoreboard{grid-template-columns:1fr 1fr;}
      #board{
        width:min(98vw, calc(100svh - 220px));
        height:min(98vw, calc(100svh - 220px));
      }
    }
    @media(max-height:600px){
      .game-screen{padding:6px;}
      .top-bar,.scoreboard,.bottom-buttons{flex-shrink:0;}
      #board{
        width:min(80vw, calc(100vh - 160px));
        height:min(80vw, calc(100vh - 160px));
      }
    }
  </style>
</head>
<body>

<div class="background">
  <div class="glow glow1"></div>
  <div class="glow glow2"></div>
  <div class="glow glow3"></div>
</div>
<div class="particles" id="particles"></div>

<!-- MENU -->
<section class="menu-screen" id="menuScreen">
  <h1 class="logo">NEON SHASHKA</h1>
  <div class="menu-card">
    <button id="playBotBtn">🤖 Bot bilan o'yin</button>
    <button id="playFriendBtn">👥 Do'st bilan o'yin</button>
    <button id="statsBtn">🏆 Statistika</button>
  </div>
</section>

<!-- GAME -->
<section class="game-screen hidden" id="gameScreen">
  <div class="top-bar">
    <button id="backBtn" style="padding:10px 16px;font-size:0.85rem;">⬅ Menu</button>
    <div class="turn-box" id="turnBox">
      NAVBAT: <span id="turnText">QIZIL</span>
    </div>
    <button id="restartBtn" style="padding:10px 16px;font-size:0.85rem;">🔄 Yangi</button>
  </div>

  <div class="scoreboard">
    <div class="score-card red-card">
      🟥 Qizil <span class="score-num" id="redScore">0</span>
    </div>
    <div class="score-card blue-card">
      🟦 Ko'k <span class="score-num" id="blueScore">0</span>
    </div>
  </div>

  <div class="board-wrapper">
    <div id="board"></div>
  </div>
</section>

<!-- STATS -->
<section class="stats-screen hidden" id="statsScreen">
  <h2>🏆 STATISTIKA</h2>
  <div class="stats-box">
    <div>🟥 Qizil g'alaba: <strong id="statsRed">0</strong></div>
    <div>🟦 Ko'k g'alaba: <strong id="statsBlue">0</strong></div>
  </div>
  <button id="closeStatsBtn">⬅ Orqaga</button>
</section>

<script>
  /* ---- PARTICLES ---- */
  (function(){
    const el = document.getElementById('particles');
    for(let i=0;i<30;i++){
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random()*100+'%';
      p.style.animationDuration = (8+Math.random()*15)+'s';
      p.style.animationDelay = (-Math.random()*20)+'s';
      p.style.width = p.style.height = (1+Math.random()*2)+'px';
      p.style.background = Math.random()>0.5 ? 'var(--cyan)' : 'var(--pink)';
      el.appendChild(p);
    }
  })();

  /* ---- ELEMENTS ---- */
  const boardEl       = document.getElementById("board");
  const menuScreen    = document.getElementById("menuScreen");
  const gameScreen    = document.getElementById("gameScreen");
  const statsScreen   = document.getElementById("statsScreen");
  const turnText      = document.getElementById("turnText");
  const turnBox       = document.getElementById("turnBox");
  const redScoreEl    = document.getElementById("redScore");
  const blueScoreEl   = document.getElementById("blueScore");
  const statsRed      = document.getElementById("statsRed");
  const statsBlue     = document.getElementById("statsBlue");

  /* ---- STATE ----
     sessionStorage: o'chiriladi brauzer/tab yopilganda ✓
  ---- */
  let board = [], selected = null, current = "red", playWithBot = false;

  let stats = JSON.parse(sessionStorage.getItem("stats")) || { red:0, blue:0 };

  /* ---- SAVE ---- */
  function save(){
    sessionStorage.setItem("stats", JSON.stringify(stats));
  }

  /* ---- INIT ---- */
  function initBoard(){
    board = [];
    for(let r=0;r<8;r++){
      let row=[];
      for(let c=0;c<8;c++){
        let piece=null;
        if((r+c)%2===1){
          if(r<3)  piece={color:"blue",king:false};
          if(r>4)  piece={color:"red", king:false};
        }
        row.push(piece);
      }
      board.push(row);
    }
    current="red"; selected=null;
    render();
  }

  /* ---- RENDER ---- */
  function render(){
    boardEl.innerHTML="";

    for(let r=0;r<8;r++){
      for(let c=0;c<8;c++){
        const cell=document.createElement("div");
        cell.className=`cell ${(r+c)%2===0?"light":"dark"}`;

        const p=board[r][c];
        if(p){
          const piece=document.createElement("div");
          piece.className=`piece ${p.color}`;
          if(p.king) piece.classList.add("king");
          if(selected&&selected.r===r&&selected.c===c) piece.classList.add("selected");
          piece.onclick=()=>select(r,c);
          cell.appendChild(piece);
        }

        if(selected){
          getMoves(board,selected.r,selected.c).forEach(m=>{
            if(m.r===r&&m.c===c){
              const dot=document.createElement("div");
              dot.className="move"+(m.cap?" capture":"");
              dot.onclick=()=>doMove(m);
              cell.appendChild(dot);
            }
          });
        }

        boardEl.appendChild(cell);
      }
    }

    /* turn indicator */
    turnText.innerText = current==="red"?"QIZIL":"KO'K";
    if(current==="red"){
      turnBox.classList.add("red-turn");
    } else {
      turnBox.classList.remove("red-turn");
    }

    updateScoreDisplay();
  }

  /* ---- SELECT ---- */
  function select(r,c){
    const p=board[r][c];
    if(!p||p.color!==current) return;
    selected={r,c};
    render();
  }

  /* ---- MOVES ---- */
  function inBoard(r,c){return r>=0&&r<8&&c>=0&&c<8;}
  function getDirs(p){
    if(p.king) return[[1,1],[1,-1],[-1,1],[-1,-1]];
    return p.color==="red"?[[-1,1],[-1,-1]]:[[1,1],[1,-1]];
  }

  function getMoves(b,r,c){
    const p=b[r][c];
    if(!p) return[];
    let moves=[];
    for(let[dr,dc]of getDirs(p)){
      let nr=r+dr,nc=c+dc;
      if(inBoard(nr,nc)&&!b[nr][nc]) moves.push({r:nr,c:nc,cap:false});
      let jr=r+dr*2,jc=c+dc*2;
      if(inBoard(jr,jc)&&b[nr][nc]&&b[nr][nc].color!==p.color&&!b[jr][jc])
        moves.push({r:jr,c:jc,cap:true,kill:{r:nr,c:nc}});
    }
    const caps=moves.filter(m=>m.cap);
    return caps.length?caps:moves;
  }

  /* ---- MOVE ---- */
  function doMove(m){
    const p=board[selected.r][selected.c];
    board[m.r][m.c]=p;
    board[selected.r][selected.c]=null;
    if(m.cap) board[m.kill.r][m.kill.c]=null;
    if(p.color==="red"&&m.r===0) p.king=true;
    if(p.color==="blue"&&m.r===7) p.king=true;
    selected=null;
    current=current==="red"?"blue":"red";
    render();
    checkWin();
    if(playWithBot&&current==="blue"&&!checkWinSilent()){
      setTimeout(botMove,150);
    }
  }

  /* ---- BOT (MINIMAX + ALPHA-BETA) ---- */
  function cloneBoard(b){return JSON.parse(JSON.stringify(b));}

  function evalBoard(b){
    let s=0;
    for(let r=0;r<8;r++) for(let c=0;c<8;c++){
      const p=b[r][c];
      if(!p) continue;
      let v=p.king?10:5;
      s+=p.color==="blue"?v:-v;
    }
    return s;
  }

  function allMoves(b,color){
    let moves=[];
    for(let r=0;r<8;r++) for(let c=0;c<8;c++){
      const p=b[r][c];
      if(p&&p.color===color) getMoves(b,r,c).forEach(m=>moves.push({from:{r,c},m}));
    }
    let caps=moves.filter(x=>x.m.cap);
    return caps.length?caps:moves;
  }

  function applyMove(b,mv){
    let nb=cloneBoard(b);
    let p=nb[mv.from.r][mv.from.c];
    nb[mv.m.r][mv.m.c]=p;
    nb[mv.from.r][mv.from.c]=null;
    if(mv.m.cap) nb[mv.m.kill.r][mv.m.kill.c]=null;
    if(p.color==="red"&&mv.m.r===0) p.king=true;
    if(p.color==="blue"&&mv.m.r===7) p.king=true;
    return nb;
  }

  function minimax(b,depth,alpha,beta,isMax){
    if(depth===0) return evalBoard(b);
    let color=isMax?"blue":"red";
    let moves=allMoves(b,color);
    if(moves.length===0) return isMax?-9999:9999;
    if(isMax){
      let max=-Infinity;
      for(let m of moves){
        let v=minimax(applyMove(b,m),depth-1,alpha,beta,false);
        max=Math.max(max,v); alpha=Math.max(alpha,v);
        if(beta<=alpha) break;
      }
      return max;
    } else {
      let min=Infinity;
      for(let m of moves){
        let v=minimax(applyMove(b,m),depth-1,alpha,beta,true);
        min=Math.min(min,v); beta=Math.min(beta,v);
        if(beta<=alpha) break;
      }
      return min;
    }
  }

  function botMove(){
    let moves=allMoves(board,"blue");
    if(!moves.length) return;
    let best=null,bestScore=-Infinity;
    for(let m of moves){
      let score=minimax(applyMove(board,m),4,-Infinity,Infinity,false);
      if(score>bestScore){bestScore=score;best=m;}
    }
    if(!best) return;
    selected=best.from;
    doMove(best.m);
  }

  /* ---- WIN ---- */
  function countPieces(){
    let r=0,b=0;
    for(let row of board) for(let p of row){
      if(p?.color==="red") r++;
      if(p?.color==="blue") b++;
    }
    return{r,b};
  }

  function checkWinSilent(){
    const {r,b}=countPieces();
    return r===0||b===0;
  }

  function checkWin(){
    const {r,b}=countPieces();
    if(r===0){ showWin("blue"); return; }
    if(b===0){ showWin("red");  return; }
  }

  function showWin(winner){
    stats[winner]++;
    save();
    updateScoreDisplay();

    const overlay=document.createElement("div");
    overlay.className="win-overlay";

    const emoji  = winner==="red"?"🟥":"🟦";
    const name   = winner==="red"?"Qizil":"Ko'k";
    const cls    = winner==="red"?"red-win":"blue-win";

    overlay.innerHTML=`
      <div class="win-text ${cls}">${emoji} ${name.toUpperCase()} YUTDI!</div>
      <div class="win-sub">Tabriklaymiz! 🎉</div>
      <div class="win-buttons">
        <button id="winRestart">🔄 Qayta o'ynash</button>
        <button id="winMenu">🏠 Menu</button>
      </div>
    `;

    document.body.appendChild(overlay);

    overlay.querySelector("#winRestart").onclick=()=>{
      overlay.remove(); initBoard();
    };
    overlay.querySelector("#winMenu").onclick=()=>{
      overlay.remove();
      gameScreen.classList.add("hidden");
      menuScreen.classList.remove("hidden");
    };
  }

  /* ---- SCORE DISPLAY ---- */
  function updateScoreDisplay(){
    redScoreEl.textContent  = stats.red;
    blueScoreEl.textContent = stats.blue;
    statsRed.textContent    = stats.red;
    statsBlue.textContent   = stats.blue;
  }

  /* ---- MENU BUTTONS ---- */
  document.getElementById("playBotBtn").onclick=()=>{
    playWithBot=true;
    menuScreen.classList.add("hidden");
    gameScreen.classList.remove("hidden");
    initBoard();
  };
  document.getElementById("playFriendBtn").onclick=()=>{
    playWithBot=false;
    menuScreen.classList.add("hidden");
    gameScreen.classList.remove("hidden");
    initBoard();
  };
  document.getElementById("statsBtn").onclick=()=>{
    updateScoreDisplay();
    menuScreen.classList.add("hidden");
    statsScreen.classList.remove("hidden");
  };
  document.getElementById("closeStatsBtn").onclick=()=>{
    statsScreen.classList.add("hidden");
    menuScreen.classList.remove("hidden");
  };
  document.getElementById("backBtn").onclick=()=>{
    gameScreen.classList.add("hidden");
    menuScreen.classList.remove("hidden");
  };
  document.getElementById("restartBtn").onclick=initBoard;

  /* INIT */
  initBoard();
  updateScoreDisplay();
</script>
</body>
</html>
